{% load static %}
<header class="site-header">
    <nav class="site-nav">
        <div class="container nav-container">
            <a class="nav-brand" href="{% url 'home' %}">
                <img src="{% static 'images/site-logo-1.png' %}" alt="Wellness Studio Logo" class="nav-logo">
            </a>

            <input type="checkbox" id="nav-toggle" class="nav-toggle">

            <label for="nav-toggle" class="nav-toggle-label">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <div class="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'services' %}">Practices</a>
                    </li>
                    {% if user.is_authenticated %}
                        {% if request.user.profile.role == 'Host' %}
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'manage_page' %}">Manage Page</a>
                            </li>
                        {% endif %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'my_profile' pk=user.pk %}">My Profile</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'register' %}">Register</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

</header>
